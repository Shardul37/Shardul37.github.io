<!DOCTYPE html>
<html>
<head>
  <title>Shardul's Blog</title>
</head>
<body>
  <h1>Shardul's Blog</h1>
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        — {{ post.date | date: "%b %d, %Y" }}
      </li>
    {% endfor %}
  </ul>
</body>
</html>
